{% extends 'tracker_api/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete Shift</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the shift <strong>"{{ shift.name }}"</strong>?</p>
                <p class="text-muted small">This will unassign all employees currently linked to this shift.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'shift-list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
