<!-- Screenshot Gallery Fragment -->
<div class="px-3 py-2 border-bottom border-light border-opacity-10 d-flex justify-content-between align-items-center bg-white bg-opacity-5">
    <div>
        <h6 class="mb-0 small fw-bold"><i class="fas fa-images me-2 text-primary"></i> Visual History Snapshots</h6>
        <p class="mb-0 x-small text-muted-custom">Activity visual audit</p>
    </div>
    <div class="d-flex align-items-center gap-2">
        <!-- Select All Provision -->
        <div class="form-check me-2">
            <input class="form-check-input x-small mb-0" type="checkbox" id="master-screenshot-checkbox" onchange="toggleSelectAllScreenshots(this)">
            <label class="form-check-label x-small text-muted-custom fw-bold" for="master-screenshot-checkbox">ALL DEVICES</label>
        </div>
        
        <form action="/device/{{ device.id }}/command/" method="POST" class="cmd-ajax-form">
            {% csrf_token %}
            <input type="hidden" name="command_type" value="screenshot">
            <input type="hidden" name="parameters" value='{"count": 3}'>
            <button type="submit" class="btn btn-sm btn-outline-primary rounded-pill px-3 x-small">
                <i class="fas fa-bolt me-1"></i> Burst Audit
            </button>
        </form>
        
        <button id="archive-selected-btn" class="btn btn-sm btn-outline-warning rounded-pill px-3 x-small d-none" 
                data-archive-url="/device/{{ device.id }}/screenshots/bulk-archive/"
                onclick="processArchiveRequest()">
            <i class="fas fa-box-archive me-1"></i> Archive Records
        </button>
    </div>
</div>

<div class="p-2" id="gallery-container" data-device-id="{{ device.id }}">
    <div class="row g-1">
        {% for screen in screenshots %}
        <div class="col-4 col-md-3 position-relative screenshot-wrapper mb-1">
            <div class="form-check position-absolute top-0 start-0 m-1 z-index-2">
                <input class="form-check-input screen-checkbox" type="checkbox" value="{{ screen.id }}" onchange="updateGalleryUI()">
            </div>
            <a href="{% if MEDIA_URL %}{{ MEDIA_URL }}{{ screen.image_path }}{% else %}/media/{{ screen.image_path }}{% endif %}" target="_blank" class="d-block ratio ratio-16x9 overflow-hidden rounded border border-light border-opacity-10 hover-bright shadow-sm">
                <img src="{% if MEDIA_URL %}{{ MEDIA_URL }}{{ screen.image_path }}{% else %}/media/{{ screen.image_path }}{% endif %}" 
                     class="img-fluid" 
                     alt="Capture"
                     style="object-fit: cover;">
                
                <div class="screenshot-meta opacity-0 position-absolute bottom-0 start-0 end-0 bg-dark bg-opacity-75 p-1 text-center" style="transition: opacity 0.2s; pointer-events: none;">
                    <div class="x-small text-white" style="font-size: 0.6rem;">{{ screen.timestamp|date:"H:i:s" }}</div>
                </div>
            </a>
        </div>
        {% empty %}
        <div class="col-12 py-4 text-center text-muted-custom x-small italic">No captures recorded for this device.</div>
        {% endfor %}
    </div>
</div>

<style>
    .screenshot-wrapper:hover .screenshot-meta { opacity: 1 !important; }
    .z-index-2 { z-index: 2; }
    .form-check-input.screen-checkbox { 
        width: 1rem; 
        height: 1rem; 
        background-color: rgba(255,255,255,0.2); 
        border: 1px solid rgba(255,255,255,0.4);
    }
    .form-check-input.screen-checkbox:checked { background-color: #f59e0b; border-color: #f59e0b; }
</style>
