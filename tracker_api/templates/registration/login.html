<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Enterprise Activity Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
    </style>
</head>
<body class="login-container">
    <div class="glass-card login-card fade-in">
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold">Project RAT</h2>
            <p class="text-muted-custom">Secure Admin Console</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger bg-danger border-0 text-white py-2 small">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label small text-muted-custom">Username</label>
                <input type="text" name="username" id="id_username" class="form-control bg-dark border-secondary text-white" required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label small text-muted-custom">Password</label>
                <input type="password" name="password" id="id_password" class="form-control bg-dark border-secondary text-white" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary py-2 fw-bold">Sign In to Dashboard</button>
            </div>
        </form>
        
        <div class="text-center mt-3">
            <small class="text-muted-custom">Restricted Access only.</small>
        </div>
    </div>
</body>
</html>
